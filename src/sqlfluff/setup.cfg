[sqlfluff]
dialect = postgres
exclude_rules = ambiguous.column_count, structure.column_order
max_line_length = 100
processes = -1
sql_file_exts = .sql
large_file_skip_byte_limit = 65535

[sqlfluff:indentation]
implicit_indents = allow
indent_unit = space
indented_ctes = True
indented_joins = True
indented_on_contents = True
indented_then = True
indented_then_contents = True
indented_using_on = True
tab_space_size = 2
template_blocks_indent = True
trailing_comments = before

[sqlfluff:layout:type:binary_operator]
line_position = leading

[sqlfluff:layout:type:comma]
spacing_before = touch
line_position = trailing

[sqlfluff:rules:aliasing.table]
aliasing = explicit

[sqlfluff:rules:aliasing.column]
aliasing = explicit

[sqlfluff:rules:aliasing.length]
min_alias_length = 2
max_alias_length = 30

[sqlfluff:rules:aliasing.forbid]
force_enable = False

[sqlfluff:rules:capitalisation.keywords]
capitalisation_policy = lower

[sqlfluff:rules:capitalisation.identifiers]
extended_capitalisation_policy = lower

[sqlfluff:rules:capitalisation.functions]
extended_capitalisation_policy = lower

[sqlfluff:rules:capitalisation.literals]
capitalisation_policy = lower

[sqlfluff:rules:capitalisation.types]
extended_capitalisation_policy = lower

[sqlfluff:rules:ambiguous.column_references]
group_by_and_order_by_style = consistent

[sqlfluff:rules:references.from]
force_enable = True

[sqlfluff:rules:references.qualification]
single_table_references = consistent

[sqlfluff:rules:references.keywords]
ignore_words =

[sqlfluff:rules:convention.not_equal]
preferred_not_equal_style = c_style

[sqlfluff:rules:convention.casting_style]
preferred_type_casting_style = shorthand

[sqlfluff:rules:convention.terminator]
multiline_newline = False
require_final_semicolon = True

[sqlfluff:rules:convention.quoted_literals]
preferred_quoted_literal_style = single_quotes

[sqlfluff:rules:layout.long_lines]
ignore_comment_lines = True
ignore_comment_clauses = True

[sqlfluff:rules:layout.select_targets]
wildcard_policy = single

[sqlfluff:rules:references.quoting]
preferred_quoted_identifiers = necessary

[sqlfluff:rules:structure.subquery]
forbid_subquery_in = join
